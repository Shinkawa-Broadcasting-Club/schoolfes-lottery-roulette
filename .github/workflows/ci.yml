name: CI

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  ci:
    name: Build Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install WiX Toolset
        run: choco install wixtoolset -y --no-progress

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: sbc-lottery-roulette-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: sbc-lottery-roulette-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @()
          $assets += Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.exe" | ForEach-Object { $_.FullName }
          $assets += Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi" | ForEach-Object { $_.FullName }

          gh release create $env:GITHUB_REF_NAME $assets --title $env:GITHUB_REF_NAME --notes ""
