<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SBC 抽選ルーレット</title>
    <!-- Keep in sync with THEME_BOOTSTRAP_SCRIPT / THEME_LOCALSTORAGE_KEY in src/lib/theme.ts -->
    <script>
      (function () {
        var theme = 'orange';
        try {
          var t = localStorage.getItem('sbc-lottery-roulette-last-theme');
          if (t === 'dark' || t === 'light' || t === 'orange') theme = t;
        } catch (e) {}
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
